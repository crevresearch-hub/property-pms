<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" preserveAspectRatio="xMidYMid meet">
  <!-- Arabic text -->
  <text x="190" y="32" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#000" text-anchor="end" direction="rtl">دائرة الأراضي والأملاك</text>
  <!-- English text -->
  <text x="190" y="55" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#000" text-anchor="end" letter-spacing="0.5">Land Department</text>
  <!-- DLD Palm Tree Emblem -->
  <g transform="translate(210, 10)">
    <!-- Outer red ring -->
    <circle cx="32" cy="32" r="30" fill="none" stroke="#E30613" stroke-width="2.5"/>
    <!-- White inner -->
    <circle cx="32" cy="32" r="27" fill="#fff"/>
    <!-- Inner red dot -->
    <circle cx="32" cy="32" r="25" fill="none" stroke="#E30613" stroke-width="1"/>
    <!-- Palm tree trunk -->
    <rect x="30" y="30" width="4" height="20" fill="#1a4d2e"/>
    <!-- Palm fronds -->
    <g fill="#2d8050" stroke="#1a4d2e" stroke-width="0.5">
      <path d="M 32,30 Q 20,22 14,28 Q 22,28 32,32"/>
      <path d="M 32,30 Q 44,22 50,28 Q 42,28 32,32"/>
      <path d="M 32,28 Q 18,18 12,22 Q 22,22 32,30"/>
      <path d="M 32,28 Q 46,18 52,22 Q 42,22 32,30"/>
      <path d="M 32,26 Q 22,14 18,18 Q 26,18 32,28"/>
      <path d="M 32,26 Q 42,14 46,18 Q 38,18 32,28"/>
      <path d="M 32,24 Q 28,14 30,12 Q 32,18 32,26"/>
      <path d="M 32,24 Q 36,14 34,12 Q 32,18 32,26"/>
    </g>
    <!-- Date dots -->
    <g fill="#1a4d2e">
      <circle cx="20" cy="26" r="1"/>
      <circle cx="44" cy="26" r="1"/>
      <circle cx="22" cy="22" r="0.8"/>
      <circle cx="42" cy="22" r="0.8"/>
    </g>
  </g>
</svg>
