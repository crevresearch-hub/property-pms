<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" preserveAspectRatio="xMidYMid meet">
  <!-- Arabic text -->
  <text x="40" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="start" direction="rtl">حكومة دبي</text>
  <!-- English text -->
  <text x="10" y="50" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#000" letter-spacing="1.5">GOVERNMENT</text>
  <text x="58" y="64" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#000" letter-spacing="1.5">OF DUBAI</text>
  <!-- UAE Emblem (simplified falcon) -->
  <g transform="translate(165, 5) scale(0.8)">
    <!-- Shield base -->
    <ellipse cx="35" cy="40" rx="25" ry="32" fill="#c8a951" stroke="#8b6914" stroke-width="1"/>
    <!-- Falcon body -->
    <path d="M 35,15 L 25,30 L 28,45 L 35,55 L 42,45 L 45,30 Z" fill="#8b6914"/>
    <!-- Wings -->
    <path d="M 15,28 Q 25,20 35,30 Q 45,20 55,28 L 50,38 Q 35,32 20,38 Z" fill="#a08055"/>
    <!-- Tail feathers -->
    <path d="M 30,55 L 25,68 M 35,55 L 35,70 M 40,55 L 45,68" stroke="#8b6914" stroke-width="2" fill="none"/>
  </g>
</svg>
